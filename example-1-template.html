<!DOCTYPE html>

<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Example 1 - Template Tag | Wiet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
  <page-header></page-header>

  <div class="container my-5">
    <div class="row">
      <div class="col-lg-8 mx-auto">
        <example-section icon="bi bi-1-circle-fill" title="Example 1: Template Tag (Light DOM)" description="Component using inline &lt;template&gt; tag with light DOM rendering. Features attributes, events, and custom event dispatching." variant="primary">
        </example-section>

        <div class="card mb-4">
          <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-eye"></i> Live Demo</h5>
          </div>
          <div class="card-body source">
            <greeting-card name="Alice" message="Welcome to the Wiet demo!"></greeting-card>

            <div class="mt-4">
              <h6>Update Attributes:</h6>
              <div class="input-group mb-2">
                <span class="input-group-text">Name</span>
                <input type="text" class="form-control" id="nameInput" value="Alice">
              </div>
              <div class="input-group mb-2">
                <span class="input-group-text">Message</span>
                <input type="text" class="form-control" id="messageInput" value="Welcome to the Wiet demo!">
              </div>
              <button class="btn btn-primary" id="updateBtn">
                <i class="bi bi-arrow-repeat"></i> Update Component
              </button>
            </div>
          </div>
        </div>

        <event-log id="eventLog"></event-log>

        <view-code></view-code>
      </div>
    </div>
  </div>

  <template id="greeting-template" class="source">
    <style>
      @scope {
        .greeting {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          padding: 20px;
          border-radius: 8px;
          text-align: center;
        }

        .greeting h3 {
          margin: 0 0 10px 0;
        }

        .greeting button {
          margin-top: 10px;
        }
      }
    </style>
    <div class="greeting">
      <h3 class="greeting-text">Hello!</h3>
      <p class="message-text"></p>
      <button class="btn btn-light greet-btn">👋 Send Greeting</button>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" class="source">
    import { wiet } from './wiet.js';
    import './widgets.js';
    const eventLog = document.getElementById('eventLog');

    function logEvent(message) {
      eventLog.log(message);
    }

    wiet('greeting-card', '#greeting-template', {
      attrs: ['name', 'message'],

      mounted() {
        logEvent('✅ greeting-card mounted');
        this.updateGreeting();
      },

      changed(attr, oldVal, newVal) {
        logEvent(`🔄 Attribute "${attr}" changed: "${oldVal}" → "${newVal}"`);
        if (attr === 'name' || attr === 'message') {
          this.updateGreeting();
        }
      },

      handles: {
        '.greet-btn': {
          click() {
            const name = this.getAttribute('name') || 'Guest';
            logEvent(`👋 Greeting sent from ${name}`);
            this.dispatchEvent(new CustomEvent('greeting-sent', {
              bubbles: true,
              detail: { name, timestamp: Date.now() }
            }));
          }
        }
      },

      methods: {
        updateGreeting() {
          const name = this.getAttribute('name') || 'Guest';
          const message = this.getAttribute('message') || 'Welcome!';
          this.querySelector('.greeting-text').textContent = `Hello, ${name}!`;
          this.querySelector('.message-text').textContent = message;
        }
      }
    });

    // Listen for custom event
    document.addEventListener('greeting-sent', (e) => {
      logEvent(`📢 Custom event received: greeting from ${e.detail.name}`);
    });

    // Update button handler
    document.getElementById('updateBtn').addEventListener('click', () => {
      const card = document.querySelector('greeting-card');
      card.setAttribute('name', document.getElementById('nameInput').value);
      card.setAttribute('message', document.getElementById('messageInput').value);
    });

    setTimeout(() => logEvent('🚀 Component initialized'), 100);
  </script>
</body>

</html>
