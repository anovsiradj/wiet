<!DOCTYPE html>

<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Example 3 - External HTML | Wiet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
  <page-header></page-header>

  <div class="container my-5">
    <div class="row">
      <div class="col-lg-8 mx-auto">
        <example-section icon="bi bi-3-circle-fill" title="Example 3: External HTML File" description="Component HTML loaded from external file (user-card.html). Demonstrates file-based component organization with light DOM." variant="info">
        </example-section>

        <div class="card mb-4">
          <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-eye"></i> Live Demo</h5>
          </div>
          <div class="card-body source">
            <user-card user-name="John Doe" email="john@example.com" role="Administrator">
            </user-card>

            <user-card user-name="Jane Smith" email="jane@example.com" role="Developer" class="mt-3">
            </user-card>

            <div class="mt-4">
              <h6>Add New User:</h6>
              <div class="input-group mb-2">
                <span class="input-group-text">Name</span>
                <input type="text" class="form-control" id="nameInput" placeholder="Enter name">
              </div>
              <div class="input-group mb-2">
                <span class="input-group-text">Email</span>
                <input type="email" class="form-control" id="emailInput" placeholder="Enter email">
              </div>
              <div class="input-group mb-2">
                <span class="input-group-text">Role</span>
                <select class="form-select" id="roleInput">
                  <option value="Member">Member</option>
                  <option value="Developer">Developer</option>
                  <option value="Administrator">Administrator</option>
                </select>
              </div>
              <button class="btn btn-info" id="addUserBtn">
                <i class="bi bi-person-plus"></i> Add User
              </button>
            </div>
            <div id="newUsers" class="mt-3"></div>
          </div>
        </div>

        <event-log id="eventLog"></event-log>

        <code class="source" data-fetch="user-card.html" hidden></code>
        <view-code></view-code>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" class="source">
    import { wiet } from './wiet.js';
    import './widgets.js';
    const eventLog = document.getElementById('eventLog');

    function logEvent(message, type = 'info') {
      eventLog.log(message, type);
    }

    wiet('user-card', './user-card.html', {
      attrs: ['user-name', 'email', 'role'],

      mounted() {
        logEvent(`✅ user-card mounted: ${this.getAttribute('user-name')}`);
        this.updateUserInfo();
      },

      changed(attr) {
        logEvent(`🔄 user-card attribute "${attr}" changed`);
        this.updateUserInfo();
      },

      handles: {
        '.edit': {
          click() {
            const userName = this.getAttribute('user-name');
            logEvent(`✏️ Edit clicked for user: ${userName}`);
            this.dispatchEvent(new CustomEvent('user-edit', {
              bubbles: true,
              detail: {
                name: this.getAttribute('user-name'),
                email: this.getAttribute('email')
              }
            }));
          }
        },
        '.delete': {
          click() {
            const userName = this.getAttribute('user-name');
            logEvent(`🗑️ Delete clicked for user: ${userName}`);
            if (confirm(`Delete user ${userName}?`)) {
              this.dispatchEvent(new CustomEvent('user-delete', {
                bubbles: true,
                detail: { name: userName }
              }));
              this.remove();
            }
          }
        }
      },

      methods: {
        updateUserInfo() {
          this.querySelector('.name').textContent = this.getAttribute('user-name') || 'Unknown';
          this.querySelector('.email').textContent = `Email: ${this.getAttribute('email') || 'N/A'}`;
          this.querySelector('.role').textContent = `Role: ${this.getAttribute('role') || 'Member'}`;
        }
      }
    });

    // Listen for custom events
    document.addEventListener('user-edit', (e) => {
      logEvent(`📢 User edit event: ${e.detail.name}`);
      alert(`Edit user: ${e.detail.name} (${e.detail.email})`);
    });

    document.addEventListener('user-delete', (e) => {
      logEvent(`📢 User deleted: ${e.detail.name}`);
    });

    // Add user button handler
    document.getElementById('addUserBtn').addEventListener('click', () => {
      const name = document.getElementById('nameInput').value;
      const email = document.getElementById('emailInput').value;
      const role = document.getElementById('roleInput').value;

      if (!name || !email) {
        alert('Please fill in name and email');
        return;
      }

      const card = document.createElement('user-card');
      card.setAttribute('user-name', name);
      card.setAttribute('email', email);
      card.setAttribute('role', role);
      card.className = 'mt-3';

      document.getElementById('newUsers').appendChild(card);
      logEvent(`➕ Added new user: ${name}`);

      // Clear inputs
      document.getElementById('nameInput').value = '';
      document.getElementById('emailInput').value = '';
    });

    setTimeout(() => logEvent('🚀 External HTML components initialized'), 100);
  </script>
</body>

</html>
